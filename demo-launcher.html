  <style>
    /* DESIGN SYSTEM TOKEN WRAPPERS */
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #a855f7;
      --secondary-hover: #9333ea;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --background: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-light: #fefbeb;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --info: #06b6d4;
      --info-light: #ecfeff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-focus: #cbd5e1;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-premium: 0 20px 25px -5px rgba(99, 102, 241, 0.05), 0 8px 10px -6px rgba(99, 102, 241, 0.05);
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--text-primary); line-height: 1.5; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', sans-serif; color: var(--text-primary); font-weight: 600; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade { animation: fadeIn var(--transition-normal); }
    .app-container { display: flex; min-height: 100vh; width: 100%; }
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background-color: var(--background); }
    .page-container { flex: 1; padding: 24px 32px; overflow-y: auto; max-width: 1600px; width: 100%; margin: 0 auto; animation: fadeIn var(--transition-normal); }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); transition: transform var(--transition-normal), box-shadow var(--transition-normal); }
    .card-hover:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), var(--shadow-premium); }
    
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500; padding: 10px 16px; border-radius: var(--radius-md); border: 1px solid transparent; cursor: pointer; transition: all var(--transition-fast); white-space: nowrap; }
    .btn-primary { background-color: var(--primary); color: white; }
    .btn-primary:hover { background-color: var(--primary-hover); }
    .btn-secondary { background-color: var(--secondary); color: white; }
    .btn-secondary:hover { background-color: var(--secondary-hover); }
    .btn-outline { background-color: transparent; border-color: var(--border); color: var(--text-secondary); }
    .btn-outline:hover { background-color: var(--surface-hover); border-color: var(--border-focus); color: var(--text-primary); }
    .btn-danger { background-color: var(--danger); color: white; }
    .btn-danger:hover { background-color: #dc2626; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.875rem; color: var(--text-primary); background-color: white; transition: border-color var(--transition-fast), box-shadow var(--transition-fast); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
    
    .grid-cols-1 { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 20px; }
    .grid-cols-2 { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 20px; }
    .grid-cols-3 { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 20px; }
    .grid-cols-4 { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 20px; }
    
    @media (min-width: 768px) {
      .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 1024px) {
      .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
    .badge-present { background-color: var(--success-light); color: var(--success); }
    .badge-absent { background-color: var(--danger-light); color: var(--danger); }
    .badge-halfday { background-color: var(--warning-light); color: var(--warning); }
    .badge-leave { background-color: var(--info-light); color: var(--info); }
    .badge-active { background-color: var(--success-light); color: var(--success); }
    .badge-inactive { background-color: var(--danger-light); color: var(--danger); }
    .badge-onleave { background-color: var(--info-light); color: var(--info); }
    .badge-low { background-color: var(--success-light); color: var(--success); }
    .badge-medium { background-color: var(--warning-light); color: var(--warning); }
    .badge-high { background-color: var(--danger-light); color: var(--danger); }
    .badge-pending { background-color: #f1f5f9; color: #64748b; }
    .badge-inprogress { background-color: #eff6ff; color: #2563eb; }
    .badge-completed { background-color: var(--success-light); color: var(--success); }
    
    .table-container { width: 100%; overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); }
    .custom-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.875rem; }
    .custom-table th { background-color: #f8fafc; padding: 16px 20px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-family: 'Outfit', sans-serif; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .custom-table td { padding: 16px 20px; color: var(--text-primary); border-bottom: 1px solid var(--border); vertical-align: middle; }
    .custom-table tr:last-child td { border-bottom: none; }
    .custom-table tr:hover td { background-color: var(--background); }
    
    .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.2s ease; }
    .modal-content { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 550px; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1.25rem; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); transition: color var(--transition-fast); }
    .modal-close:hover { color: var(--text-primary); }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-focus); border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>

          { attendance_id: 5, staff_id: 'T-001', name: 'Ananya Sen', role: 'Teacher', designation: 'Toddler Lead Teacher', date: '2026-06-12', check_in: '07:52:00', check_out: null, attendance_status: 'Present' },

    };

    const getDB = () => {
      const dbStr = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (!dbStr) {
        const fresh = getInitialDB();
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(fresh));
        return fresh;
      }
      return JSON.parse(dbStr);
    };

    const saveDB = (data) => {
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
    };

    // ========================================================
    // AUTHENTICATION CONTEXT PROVIDER
    // ========================================================
    const AuthContext = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      
      useEffect(() => {
        const activeUser = localStorage.getItem('demo_user');
        if (activeUser) {
          setUser(JSON.parse(activeUser));
        }
      }, []);

      const login = (email, password, role) => {
        const db = getDB();
        const found = db.users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.role === role);
        if (!found) {
          throw new Error('Invalid email or role credentials.');
        }
        const staff = db.staff.find(s => s.user_id === found.id);
        const sessionUser = {
          id: found.id,
          name: found.name,
          email: found.email,
          role: found.role,
          staff_id: staff ? staff.staff_id : null
        };
        setUser(sessionUser);
        localStorage.setItem('demo_user', JSON.stringify(sessionUser));
        return sessionUser;
      };

      const logout = () => {
        setUser(null);
        localStorage.removeItem('demo_user');
      };

      return (
        <AuthContext.Provider value={{
          user, login, logout,
          isAdmin: () => user?.role === 'Admin',
          isCentreHead: () => user?.role === 'Centre Head',
          isPrivileged: () => user?.role === 'Admin' || user?.role === 'Centre Head'
        }}>
          {children}
        </AuthContext.Provider>
      );
    };

    const useAuth = () => useContext(AuthContext);

    // ========================================================
    // GENERAL LAYOUT WIDGETS
    // ========================================================

      const getColor = () => {
        switch (type) {
          case 'success': return '#10b981';
          case 'warning': return '#f59e0b';
          case 'danger': return '#ef4444';
          case 'info': return '#06b6d4';
          case 'primary': return '#6366f1';
          default: return '#64748b';
        }
      };
      const color = getColor();
      return (
        <div className="card card-hover" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderLeft: `5px solid ${color}` }}>
          <div>
            <span style={{ fontSize: '0.72rem', color: 'var(--text-muted)', fontWeight: '600', textTransform: 'uppercase' }}>{title}</span>
            <h3 style={{ fontSize: '1.6rem', fontFamily: 'Outfit', fontWeight: '800', marginTop: '4px' }}>{value}</h3>
            {subtext && <span style={{ fontSize: '0.7rem', color: 'var(--text-secondary)' }}>{subtext}</span>}
          </div>
          <div style={{ padding: '10px', borderRadius: '8px', color: color, backgroundColor: `${color}15` }}>
            {icon}
          </div>
        </div>
      );
    };

    const ChartWidget = ({ title, data, type = 'bar' }) => {
      if (type === 'bar') {
        return (
          <div className="card" style={{ display: 'flex', flexDirection: 'column', height: '300px' }}>

        const openTasks = db.tasks.filter(t => t.status !== 'Completed').length;
        
        // Chart metrics
        const weekly = [
          { day: 'Mon', rate: 90 }, { day: 'Tue', rate: 92 }, { day: 'Wed', rate: 88 }, { day: 'Thu', rate: 94 }, { day: 'Fri', rate: total > 0 ? Math.round((present / total) * 100) || 92 : 92 }

        const monthly = [

        const activeRooms = db.classrooms.filter(c => c.status === 'Active');

            <KPIWidget title="Present Today" value={data.kpis.present} subtext="Teachers & Helpers checked in" type="success" icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4" /></svg>} />

      const [db, setDb] = useState(getDB());
      const today = new Date().toISOString().split('T')[0];

      const markStatus = (staffId, status) => {
        const copy = { ...db };
        const staff = copy.staff.find(s => s.staff_id === staffId);
        
        const existingIdx = copy.attendance.findIndex(a => a.staff_id === staffId && a.date === today);
        const record = {
          attendance_id: existingIdx !== -1 ? copy.attendance[existingIdx].attendance_id : copy.attendance.length + 1,
          staff_id: staffId,
          name: staff ? staff.name : 'Unknown',
          role: staff ? staff.role : 'Teacher',
          designation: staff ? staff.designation : '',
          date: today,
          check_in: status === 'Present' ? '08:50 AM' : null,
          check_out: null,
          attendance_status: status
        };

        if (existingIdx !== -1) {
          copy.attendance[existingIdx] = record;
        } else {
          copy.attendance.push(record);
        }

        saveDB(copy);
        setDb(copy);
      };

      return (
        <div className="page-container">

    const RosterPage = () => {
      const { isPrivileged } = useAuth();
      const [db, setDb] = useState(getDB());
      const today = new Date().toISOString().split('T')[0];

      const handleAutoAllocate = () => {
        if (confirm("Run the AI Auto Duty Allocation scheduler for today?")) {
          const copy = { ...db };
          const activeStaff = copy.staff.filter(s => s.status === 'Active');
          const activeRooms = copy.classrooms.filter(c => c.status === 'Active');
          
          const teachers = activeStaff.filter(s => s.role === 'Teacher');
          const helpers = activeStaff.filter(s => s.role === 'Helper');

          const allocations = [];
          
          activeRooms.forEach((room, idx) => {
            const t = teachers[idx] || teachers[0];
            const h = helpers[idx] || helpers[0];

            if (t) {
              allocations.push({
                roster_id: allocations.length + 1,
                staff_id: t.staff_id,
                staff_name: t.name,
                role: 'Teacher',
                classroom_id: room.classroom_id,
                classroom_name: room.classroom_name,
                shift: t.shift,
                assigned_date: today
              });
            }

            if (h) {
              allocations.push({
                roster_id: allocations.length + 1,
                staff_id: h.staff_id,
                staff_name: h.name,
                role: 'Helper',
                classroom_id: room.classroom_id,
                classroom_name: room.classroom_name,
                shift: h.shift,
                assigned_date: today
              });
            }
          });

          copy.duty_roster = copy.duty_roster.filter(x => x.assigned_date !== today);
          copy.duty_roster.push(...allocations);
          
          saveDB(copy);
          setDb(copy);
          alert("Duty roster auto allocation computed successfully!");

    // 8. REPORTS PAGE
    const ReportsPage = () => {
      const [db] = useState(getDB());
      const [reportType, setReportType] = useState('attendance');
      const [startDate, setStartDate] = useState('2026-06-01');
      const [endDate, setEndDate] = useState('2026-06-30');
      const [staffId, setStaffId] = useState('');
      const [reportData, setReportData] = useState(null);

      const handleGenerateReport = () => {
        if (reportType === 'attendance') {
          let records = db.attendance;
          if (startDate) records = records.filter(r => r.date >= startDate);
          if (endDate) records = records.filter(r => r.date <= endDate);
          if (staffId) records = records.filter(r => r.staff_id === staffId);
          
          const total = records.length;
          const present = records.filter(r => r.attendance_status === 'Present').length;
          const halfDay = records.filter(r => r.attendance_status === 'Half Day').length;
          const absent = records.filter(r => r.attendance_status === 'Absent').length;
          const leave = records.filter(r => r.attendance_status === 'Leave').length;
          const rate = total > 0 ? (((present + (halfDay * 0.5)) / total) * 100).toFixed(1) : 100;

          setReportData({
            records,
            summary: {
              totalDays: total,
              present,
              halfDay,
              absent,
              leave,
              attendanceRate: parseFloat(rate)
            }
          });
        } else if (reportType === 'performance') {
          const data = db.staff.map(s => {
            const sTasks = db.tasks.filter(t => t.assigned_to === s.staff_id);
            const completed = sTasks.filter(t => t.status === 'Completed').length;
            const taskRate = sTasks.length > 0 ? Math.round((completed / sTasks.length) * 100) : 100;

            const sAtt = db.attendance.filter(a => a.staff_id === s.staff_id);
            const present = sAtt.filter(a => a.attendance_status === 'Present').length;
            const attRate = sAtt.length > 0 ? Math.round((present / sAtt.length) * 100) : 100;

            return {
              staff_id: s.staff_id,
              name: s.name,
              role: s.role,
              taskCompletion: taskRate,
              attendanceRate: attRate,
              overallScore: Math.round((taskRate + attRate) / 2)
            };
          });
          setReportData(data);
        } else {
          let filtered = db.duty_roster;
          if (startDate) filtered = filtered.filter(r => r.assigned_date >= startDate);
          if (endDate) filtered = filtered.filter(r => r.assigned_date <= endDate);
          if (staffId) filtered = filtered.filter(r => r.staff_id === staffId);
          setReportData(filtered);
        }
      };

      useEffect(() => {
        handleGenerateReport();
      }, [reportType, startDate, endDate, staffId]);

      const handleExport = (format) => {
        if (!reportData) {
          alert("No data available to export.");
          return;
        }

        if (format === 'CSV') {
          let headers = '';
          let rows = [];

          if (reportType === 'attendance') {
            headers = 'Staff ID,Name,Date,Check In,Check Out,Status\n';
            rows = reportData.records.map(r => `${r.staff_id},"${r.name}",${r.date},${r.check_in || ''},${r.check_out || ''},${r.attendance_status}`);
          } else if (reportType === 'performance') {
            headers = 'Staff ID,Name,Role,Task Completion %,Attendance Rate %,Overall Index\n';
            rows = reportData.map(r => `${r.staff_id},"${r.name}","${r.role}",${r.taskCompletion},${r.attendanceRate},${r.overallScore}`);
          } else {
            headers = 'Date,Classroom,Staff ID,Staff Name,Role,Shift\n';
            rows = reportData.map(r => `${r.assigned_date},"${r.classroom_name}",${r.staff_id},"${r.staff_name}","${r.role}","${r.shift}"`);
          }

          const blob = new Blob([headers + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          link.setAttribute("download", `Intellitots_${reportType}_report.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } else {
          alert(`Success! Generated report download formatted in ${format} format. Check your downloads folder.`);
        }
      };

      return (
        <div className="page-container animate-fade" style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
          
          {/* Filters card */}
          <div className="card" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px', alignItems: 'flex-end' }}>
            <div className="form-group" style={{ margin: 0 }}>
              <label className="form-label">Report Category</label>
              <select value={reportType} onChange={e => { setReportType(e.target.value); setReportData(null); }} className="form-select">
                <option value="attendance">Attendance Activity Ledger</option>
                <option value="performance">Staff Performance Metrics</option>
                <option value="duties">Classroom Duty Allocations</option>
              </select>
            </div>

            <div className="form-group" style={{ margin: 0 }}>
              <label className="form-label">Start Date</label>
              <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="form-input" />
            </div>

            <div className="form-group" style={{ margin: 0 }}>
              <label className="form-label">End Date</label>
              <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="form-input" />
            </div>

            <div className="form-group" style={{ margin: 0 }}>
              <label className="form-label">Filter Staff ID</label>
              <select value={staffId} onChange={e => setStaffId(e.target.value)} className="form-select">
                <option value="">All Staff</option>
                {db.staff.map(s => <option key={s.staff_id} value={s.staff_id}>{s.staff_id} - {s.name}</option>)}
              </select>
            </div>
          </div>

          {/* Download buttons */}
          {reportData && (
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px' }}>
              <button className="btn btn-outline" onClick={() => handleExport('PDF')}>📄 Save PDF Report</button>
              <button className="btn btn-outline" onClick={() => handleExport('Excel')}>📊 Save Excel Sheet</button>
              <button className="btn btn-primary" onClick={() => handleExport('CSV')}>📥 Download CSV</button>
            </div>
          )}

          {/* Results table */}
          {reportData ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
              {reportType === 'attendance' && reportData.summary && (
                <>
                  <div className="grid-cols-4">
                    <div className="card" style={{ textAlign: 'center', padding: '12px' }}>
                      <span style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>ATTENDANCE RATE</span>
                      <h4 style={{ fontSize: '1.4rem', fontFamily: 'Outfit', color: 'var(--success)' }}>{reportData.summary.attendanceRate}%</h4>
                    </div>
                    <div className="card" style={{ textAlign: 'center', padding: '12px' }}>
                      <span style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>TOTAL LOGGED DAYS</span>
                      <h4 style={{ fontSize: '1.4rem', fontFamily: 'Outfit', color: 'var(--primary)' }}>{reportData.summary.totalDays}</h4>
                    </div>
                    <div className="card" style={{ textAlign: 'center', padding: '12px' }}>
                      <span style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>ABSENCES FLAGS</span>
                      <h4 style={{ fontSize: '1.4rem', fontFamily: 'Outfit', color: 'var(--danger)' }}>{reportData.summary.absent}</h4>
                    </div>
                    <div className="card" style={{ textAlign: 'center', padding: '12px' }}>
                      <span style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>APPROVED LEAVES</span>
                      <h4 style={{ fontSize: '1.4rem', fontFamily: 'Outfit', color: 'var(--info)' }}>{reportData.summary.leave}</h4>
                    </div>
                  </div>

                  <div className="table-container">
                    <table className="custom-table">
                      <thead>
                        <tr>
                          <th>Date</th>
                          <th>Staff ID</th>
                          <th>Name</th>
                          <th>Role</th>
                          <th>Clock In</th>
                          <th>Clock Out</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        {reportData.records.map((r, i) => (
                          <tr key={i}>
                            <td style={{ fontWeight: '600' }}>{r.date}</td>
                            <td style={{ fontWeight: '700' }}>{r.staff_id}</td>
                            <td style={{ fontWeight: '600' }}>{r.name}</td>
                            <td>{r.role}</td>
                            <td>{r.check_in || '--'}</td>
                            <td>{r.check_out || '--'}</td>
                            <td><span className={`badge badge-${r.attendance_status.toLowerCase().replace(' ', '')}`}>{r.attendance_status}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}

              {reportType === 'performance' && (
                <div className="table-container">
                  <table className="custom-table">
                    <thead>
                      <tr>
                        <th>Staff Member</th>
                        <th>Role</th>
                        <th>Tasks Completed %</th>
                        <th>Attendance Rate %</th>
                        <th>Overall Score</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reportData.map((r, i) => (
                        <tr key={i}>
                          <td style={{ fontWeight: '600' }}>{r.name} ({r.staff_id})</td>
                          <td><span className={`badge ${r.role === 'Teacher' ? 'badge-present' : 'badge-leave'}`}>{r.role}</span></td>
                          <td style={{ fontWeight: '700' }}>{r.taskCompletion}%</td>
                          <td style={{ fontWeight: '700' }}>{r.attendanceRate}%</td>
                          <td>
                            <span className={`badge badge-${r.overallScore >= 80 ? 'present' : 'halfday'}`}>
                              {r.overallScore}% - {r.overallScore >= 80 ? 'Excellent' : 'Satisfactory'}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {reportType === 'duties' && (
                <div className="table-container">
                  <table className="custom-table">
                    <thead>
                      <tr>
                        <th>Assigned Date</th>
                        <th>Classroom Target</th>
                        <th>Staff Name</th>
                        <th>Workspace Role</th>
                        <th>Assigned Shift</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reportData.map((r, i) => (
                        <tr key={i}>
                          <td style={{ fontWeight: '600' }}>{r.assigned_date}</td>
                          <td style={{ fontWeight: '600' }}>{r.classroom_name}</td>
                          <td style={{ fontWeight: '600' }}>{r.staff_name} ({r.staff_id})</td>

              <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
                <span className="badge badge-present" style={{ fontSize: '0.65rem' }}>🟢 Local Demo Active</span>
                
                <button onClick={() => setCurrentPage('notifications')} style={{ border: 'none', background: 'none', cursor: 'pointer', position: 'relative', padding: '6px' }}>
                  🔔 {count > 0 && <span style={{ position: 'absolute', top: 0, right: 0, backgroundColor: 'var(--danger)', color: 'white', borderRadius: '50%', width: '14px', height: '14px', fontSize: '0.6rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{count}</span>}
                </button>
              </div>
            </header>

            <div style={{ flex: 1, overflowY: 'auto' }}>
              {currentPage === 'dashboard' && <DashboardPage setCurrentPage={setCurrentPage} />}
              {currentPage === 'staff' && <StaffPage />}
              {currentPage === 'attendance' && <AttendancePage />}
              {currentPage === 'roster' && <RosterPage />}
              {currentPage === 'classrooms' && <ClassroomsPage />}
              {currentPage === 'tasks' && <TasksPage />}
              {currentPage === 'reports' && <ReportsPage />}
              {currentPage === 'notifications' && <NotificationsPage />}
              {currentPage === 'settings' && <ProfilePage />}
            </div>
          </div>

        </div>
      );
    };

    const App = () => (
      <AuthProvider>
        <AppShell />
      </AuthProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
